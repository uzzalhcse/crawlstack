services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-crawlstack}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/camoium/crawlstack/backend:latest
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-crawlstack}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-72h}
      APP_PORT: "8082"
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      TZ: ${TZ:-America/New_York}
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
    volumes:
      - uploads:/app/uploads
      - browser:/opt/camoium
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  scraper:
    image: ghcr.io/camoium/crawlstack/scraper:latest
    restart: unless-stopped
    shm_size: '512mb'
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    tmpfs:
      - /tmp
      - /run
    environment:
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      WORKER_COUNT: ${WORKER_COUNT:-4}
      WARM_POOL_SIZE: ${WARM_POOL_SIZE:-2}
      BROWSER_TIMEOUT: ${BROWSER_TIMEOUT:-120s}
      TZ: ${TZ:-America/New_York}
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      LIBGL_ALWAYS_SOFTWARE: "1"
      GALLIUM_DRIVER: softpipe
    volumes:
      - browser:/opt/camoium
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 1

  frontend:
    image: ghcr.io/camoium/crawlstack/frontend:latest
    restart: unless-stopped
    ports:
      - "3232:80"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  uploads:
  browser: