# The admin user is auto-seeded on first boot (admin@crawlstack.com / password).
# Override with ADMIN_EMAIL, ADMIN_NAME, ADMIN_PASSWORD env vars.

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${DB_NAME:-crawlstack}
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/camoium/crawlstack/backend:latest
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017
      DB_NAME: ${DB_NAME:-crawlstack}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-72h}
      APP_PORT: "8082"
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      SCRAPER_URL: http://scraper:${SCRAPER_HTTP_PORT:-8083}
      SCRAPER_TIMEOUT: ${SCRAPER_TIMEOUT:-120s}
      API_KEY: ${API_KEY:-}
      TZ: ${TZ:-America/New_York}
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
    volumes:
      - uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
      scraper:
        condition: service_started

  scraper:
    image: ghcr.io/camoium/crawlstack/scraper:latest
    restart: unless-stopped
    shm_size: '512mb'
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    tmpfs:
      - /tmp
      - /run
    environment:
      BROWSER_TIMEOUT: ${BROWSER_TIMEOUT:-120s}
      HTTP_PORT: ${SCRAPER_HTTP_PORT:-8083}
      API_KEY: ${API_KEY:-}
      TZ: ${TZ:-America/New_York}
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      LIBGL_ALWAYS_SOFTWARE: "1"
      GALLIUM_DRIVER: softpipe
    ports:
      - "${SCRAPER_HOST_PORT:-8083}:${SCRAPER_HTTP_PORT:-8083}"
    volumes:
      - browser:/opt/camoium

  browser-api:
    image: ghcr.io/camoium/crawlstack/browser-api:latest
    restart: unless-stopped
    shm_size: '512mb'
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    tmpfs:
      - /tmp
      - /run
    environment:
      PORT: "9222"
      MAX_SESSIONS: ${BROWSER_API_MAX_SESSIONS:-10}
      MAX_QUEUE: ${BROWSER_API_MAX_QUEUE:-50}
      IDLE_TIMEOUT: ${BROWSER_API_IDLE_TIMEOUT:-5m}
      BROWSER_TIMEOUT: ${BROWSER_API_BROWSER_TIMEOUT:-10m}
      LAUNCH_TIMEOUT: ${BROWSER_API_LAUNCH_TIMEOUT:-30s}
      API_KEY: ${API_KEY:-}
      TZ: ${TZ:-America/New_York}
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      LIBGL_ALWAYS_SOFTWARE: "1"
      GALLIUM_DRIVER: softpipe
    ports:
      - "9222:9222"
    volumes:
      - browser-api:/opt/camoium

  frontend:
    image: ghcr.io/camoium/crawlstack/frontend:latest
    restart: unless-stopped
    ports:
      - "3232:80"
    depends_on:
      - backend

volumes:
  mongodata:
  uploads:
  browser:
  browser-api:
